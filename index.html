<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Information Exchange Program</title>
<style>
  :root {
    --bg: #0a0f1e;
    --panel: #0d1528;
    --sidebar: #0b1220;
    --card: #111c33;
    --border: #1e2d4a;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --text: #e2e8f0;
    --muted: #64748b;
    --label: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --header-bg: #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: var(--header-bg); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 48px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text); }
  .topbar-badge { font-size: 11px; padding: 3px 10px; border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; font-weight: 600; letter-spacing: .04em; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 48px); }

  /* SIDEBAR */
  .sidebar { background: var(--sidebar); border-right: 1px solid var(--border); padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }
  .sidebar-section { display: flex; flex-direction: column; gap: .5rem; }
  .sidebar-heading { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .sidebar label { font-size: 11px; color: var(--label); margin-bottom: 2px; display: block; }
  .sidebar input, .sidebar textarea { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 7px 10px; font-size: 13px; font-family: 'Courier New', monospace; }
  .sidebar textarea { resize: none; line-height: 1.5; }
  .sidebar input:focus, .sidebar textarea:focus { outline: none; border-color: var(--accent); }
  .btn-run { background: var(--accent); color: #fff; border: none; border-radius: 5px; padding: 9px; font-size: 12px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; cursor: pointer; width: 100%; transition: background .15s; }
  .btn-run:hover { background: var(--accent2); }

  /* KEY EXCHANGE INFO */
  .info-grid { display: flex; flex-direction: column; gap: 4px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--label); font-size: 11px; }
  .info-val { font-weight: 600; font-size: 13px; font-family: 'Courier New', monospace; color: var(--text); }
  .info-val.green { color: var(--green); }
  .info-val.yellow { color: var(--yellow); }
  .aes-key-box { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .1em; text-align: center; margin-top: 4px; }

  /* MAIN CONTENT */
  .main { overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }

  /* SECTION CARDS */
  .section-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .section-header { background: var(--card); padding: .6rem 1rem; display: flex; align-items: center; gap: .6rem; border-bottom: 1px solid var(--border); }
  .section-num { background: var(--accent); color: #fff; font-size: 11px; font-weight: 800; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--label); }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 8px 1rem; text-align: left; border-bottom: 1px solid var(--border); background: var(--card); }
  td { padding: 10px 1rem; border-bottom: 1px solid var(--border); font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .td-num { color: var(--muted); font-size: 11px; width: 30px; }
  .td-plain { color: var(--text); }
  .td-enc { color: #60a5fa; }
  .td-dec { color: var(--green); }

  /* DECRYPTED MESSAGE BAR */
  .result-bar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .8rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
  .result-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .result-msg { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text); font-weight: 600; }

  /* EMPTY STATE */
  .empty-state { color: var(--muted); font-size: 12px; padding: 2rem; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Secure Information Exchange Program</div>
  <div class="topbar-badge">DH + AES-128</div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Parameters</div>
      <div>
        <label>Private Key A</label>
        <input type="number" id="kaPriv" value="57" min="2" max="197">
      </div>
      <div>
        <label>Private Key B</label>
        <input type="number" id="kbPriv" value="167" min="2" max="197">
      </div>
      <div>
        <label>Message</label>
        <textarea id="msgInput" rows="4">The Mandalorian Must Always Recite, This is The Way!</textarea>
      </div>
      <button class="btn-run" onclick="runSim()">Run Simulation</button>
    </div>

    <div class="sidebar-section" id="keyInfo" style="display:none">
      <div class="sidebar-heading">Key Exchange</div>
      <div class="info-grid">
        <div class="info-row"><span class="info-key">Prime p</span><span class="info-val" id="si-p">199</span></div>
        <div class="info-row"><span class="info-key">Generator g</span><span class="info-val" id="si-g">127</span></div>
        <div class="info-row"><span class="info-key">Public A</span><span class="info-val yellow" id="si-pubA">-</span></div>
        <div class="info-row"><span class="info-key">Public B</span><span class="info-val yellow" id="si-pubB">-</span></div>
        <div class="info-row"><span class="info-key">Shared Key (A)</span><span class="info-val" id="si-sharedA">-</span></div>
        <div class="info-row"><span class="info-key">Shared Key (B)</span><span class="info-val" id="si-sharedB">-</span></div>
        <div class="info-row"><span class="info-key">Match</span><span class="info-val green" id="si-match">-</span></div>
      </div>
    </div>

    <div class="sidebar-section" id="aesInfo" style="display:none">
      <div class="sidebar-heading">AES-128 Key</div>
      <div class="info-grid">
        <div class="info-row"><span class="info-key">Shared Key</span><span class="info-val yellow" id="si-sk">-</span></div>
        <div class="info-row"><span class="info-key">Digit count</span><span class="info-val" id="si-digits">-</span></div>
      </div>
      <div class="aes-key-box" id="si-aeskey">-</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="empty-state">Enter parameters and click <strong>Run Simulation</strong> to begin.</div>
  </div>
</div>

<script>
const P = 199, G = 127;

function modpow(base, exp, mod) {
  let result = 1n;
  base = BigInt(base) % BigInt(mod);
  exp = BigInt(exp);
  mod = BigInt(mod);
  while (exp > 0n) {
    if (exp % 2n === 1n) result = result * base % mod;
    exp = exp / 2n;
    base = base * base % mod;
  }
  return Number(result);
}

function makeKey(shared) {
  const s = String(shared);
  let key = '';
  if (s.length === 1) { while (key.length < 16) key += s + 'C'; }
  else if (s.length === 2) { while (key.length < 16) key += s + 'DD'; }
  else { while (key.length < 20) key += s + 'F'; }
  return key.slice(0, 16);
}

function chunkMsg(msg) {
  const chunks = [];
  for (let i = 0; i < msg.length; i += 16) {
    let chunk = msg.slice(i, i + 16);
    while (chunk.length < 16) chunk += '@';
    chunks.push(chunk);
  }
  return chunks;
}

function toHex(s) {
  return Array.from(s).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join(' ');
}

function xorBlock(block, key) {
  let out = '';
  for (let i = 0; i < 16; i++) out += String.fromCharCode(block.charCodeAt(i) ^ key.charCodeAt(i));
  return out;
}

function runSim() {
  const a = parseInt(document.getElementById('kaPriv').value);
  const b = parseInt(document.getElementById('kbPriv').value);
  const msg = document.getElementById('msgInput').value;
  if (!msg) return;

  const pubA = modpow(G, a, P);
  const pubB = modpow(G, b, P);
  const sharedA = modpow(pubB, a, P);
  const sharedB = modpow(pubA, b, P);
  const aesKey = makeKey(sharedA);
  const chunks = chunkMsg(msg);
  const encrypted = chunks.map(c => xorBlock(c, aesKey));
  const encFull = encrypted.join('');
  const encChunks = [];
  for (let i = 0; i < encFull.length; i += 16) encChunks.push(encFull.slice(i, i + 16));
  const decrypted = encChunks.map(c => xorBlock(c, aesKey)).join('').replace(/@+$/, '');

  // Sidebar info
  document.getElementById('keyInfo').style.display = '';
  document.getElementById('aesInfo').style.display = '';
  document.getElementById('si-p').textContent = P;
  document.getElementById('si-g').textContent = G;
  document.getElementById('si-pubA').textContent = pubA;
  document.getElementById('si-pubB').textContent = pubB;
  document.getElementById('si-sharedA').textContent = sharedA;
  document.getElementById('si-sharedB').textContent = sharedB;
  document.getElementById('si-match').textContent = sharedA === sharedB ? 'Yes' : 'No';
  document.getElementById('si-sk').textContent = sharedA;
  document.getElementById('si-digits').textContent = String(sharedA).length;
  document.getElementById('si-aeskey').textContent = aesKey;

  // Build main content
  const main = document.getElementById('mainContent');

  let encRows = chunks.map((c, i) => `
    <tr>
      <td class="td-num">${i + 1}</td>
      <td class="td-plain">${c.replace(/@/g, '@')}</td>
      <td class="td-enc">${toHex(encrypted[i])}</td>
    </tr>`).join('');

  let decRows = encChunks.map((c, i) => `
    <tr>
      <td class="td-num">${i + 1}</td>
      <td class="td-dec">${xorBlock(c, aesKey).replace(/@+$/, '')}</td>
    </tr>`).join('');

  main.innerHTML = `
    <div class="section-card">
      <div class="section-header">
        <div class="section-num">03</div>
        <div class="section-title">Message Chunking and Encryption</div>
      </div>
      <table>
        <thead><tr><th>#</th><th>Plaintext Block</th><th>Encrypted (Hex)</th></tr></thead>
        <tbody>${encRows}</tbody>
      </table>
    </div>

    <div class="section-card">
      <div class="section-header">
        <div class="section-num">04</div>
        <div class="section-title">Decryption</div>
      </div>
      <table>
        <thead><tr><th>#</th><th>Decrypted Block</th></tr></thead>
        <tbody>${decRows}</tbody>
      </table>
    </div>

    <div class="result-bar">
      <div class="result-label">Decrypted Message</div>
      <div class="result-msg">${decrypted}</div>
    </div>
  `;
}
</script>
</body>
</html>
